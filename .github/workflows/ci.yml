name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: api tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install api dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run api tests
        working-directory: apps/api
        run: pytest -v

  downstream-tests:
    name: downstream tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/downstream/pyproject.toml

      - name: Install downstream dependencies
        working-directory: apps/downstream
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run downstream tests
        working-directory: apps/downstream
        run: pytest -v

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: acme-trading-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build downstream image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/downstream
          push: false
          tags: acme-trading-downstream:ci
          cache-from: type=gha,scope=downstream
          cache-to: type=gha,scope=downstream,mode=max
