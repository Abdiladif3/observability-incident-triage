global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    environment: docker

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  - job_name: downstream
    metrics_path: /metrics
    static_configs:
      - targets: ['downstream:8001']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
